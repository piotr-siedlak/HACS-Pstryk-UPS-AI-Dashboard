# =============================================================================
# PSTRYK UPS AI — LOVELACE DASHBOARD
# =============================================================================
# Compatible with: https://github.com/piotr-siedlak/HACS-Pstryk-UPS-AI
# Version: 1.2.0
#
# ⚠️  ENTITY IDs INCLUDE YOUR UPS MODEL NAME AND YOUR HA LOCALE.
#     The IDs below were generated for UPS model "Eaton UPS" on a Polish HA.
#
#     If your entity IDs differ, open Developer Tools → States, filter by
#     "pstryk_ups", and do a global find-and-replace in this file:
#       Replace: eaton_ups
#       With:    your_model_slug   (e.g. apc_smart_ups_1500)
#
#     Friendly names may also differ if your HA language is not Polish.
#
# OPTIONAL ENHANCEMENTS (install from HACS → Frontend):
#   mini-graph-card   https://github.com/kalkih/mini-graph-card
#   mushroom          https://github.com/piitaya/lovelace-mushroom
#   button-card       https://github.com/custom-cards/button-card
#   apexcharts-card   https://github.com/RomRider/apexcharts-card
#
# INSTALLATION:
#   1. Settings → Dashboards → Add Dashboard → New empty dashboard
#   2. Name it "UPS AI" and open it
#   3. Edit → three-dot menu → Raw configuration editor
#   4. Replace all content with this file and click Save
# =============================================================================

title: UPS AI
views:

  # ===========================================================================
  # VIEW 1: OVERVIEW
  # Battery gauge, live metrics, financial summary, UPS controls
  # ===========================================================================
  - title: Overview
    path: ups-overview
    icon: mdi:battery-charging
    cards:

      # ── Battery + Current Mode + Live Power ─────────────────────────────────
      - type: horizontal-stack
        cards:

          - type: gauge
            entity: sensor.pstryk_ups_eaton_ups_poziom_naladowania_baterii
            name: Bateria
            unit: "%"
            min: 0
            max: 100
            needle: true
            severity:
              green: 60
              yellow: 30
              red: 0

          - type: entity
            entity: sensor.pstryk_ups_eaton_ups_status_harmonogramu
            name: Tryb
            icon: mdi:calendar-clock

          - type: entity
            entity: sensor.pstryk_ups_eaton_ups_biezacy_pobor_mocy
            name: Pobór mocy
            icon: mdi:lightning-bolt

      # ── Financial & timing metrics ───────────────────────────────────────────
      - type: horizontal-stack
        cards:

          - type: entity
            entity: sensor.pstryk_ups_eaton_ups_cena_energii_elektrycznej
            name: Cena energii
            icon: mdi:cash

          - type: entity
            entity: sensor.pstryk_ups_eaton_ups_szacowane_oszczednosci_dzienne
            name: Oszczędności (dziś)
            icon: mdi:piggy-bank-outline

          - type: entity
            entity: sensor.pstryk_ups_eaton_ups_nastepne_okno_ladowania
            name: Następne ładowanie
            icon: mdi:battery-arrow-up-outline

          - type: entity
            entity: sensor.pstryk_ups_eaton_ups_nastepne_okno_rozladowywania
            name: Następne rozładowanie
            icon: mdi:battery-arrow-down-outline

      # ── Controls ─────────────────────────────────────────────────────────────
      - type: entities
        title: Sterowanie
        icon: mdi:tune
        show_header_toggle: false
        entities:
          - type: section
            label: Automatyczne planowanie
          - entity: switch.pstryk_ups_eaton_ups_automatyczny_harmonogram
            name: AI Auto-harmonogram
            icon: mdi:brain
          - type: section
            label: Sterowanie ręczne (używaj tylko gdy auto-harmonogram jest WYŁĄCZONY)
          - entity: switch.pstryk_ups_eaton_ups_ladowanie_ups
            name: Wymuś ładowanie
            icon: mdi:battery-charging
          - entity: switch.pstryk_ups_eaton_ups_rozladowywanie_ups
            name: Wymuś rozładowanie
            icon: mdi:battery-minus-outline
          - type: section
            label: Akcje
          - entity: button.pstryk_ups_eaton_ups_odswiez_ceny
            name: Odśwież ceny i wygeneruj harmonogram
            icon: mdi:refresh

      # ── Live status summary ──────────────────────────────────────────────────
      - type: markdown
        title: Podsumowanie statusu
        content: |
          {% set mode    = states('sensor.pstryk_ups_eaton_ups_status_harmonogramu') %}
          {% set batt    = states('sensor.pstryk_ups_eaton_ups_poziom_naladowania_baterii') | int(0) %}
          {% set power   = states('sensor.pstryk_ups_eaton_ups_biezacy_pobor_mocy') %}
          {% set price   = states('sensor.pstryk_ups_eaton_ups_cena_energii_elektrycznej') %}
          {% set savings = states('sensor.pstryk_ups_eaton_ups_szacowane_oszczednosci_dzienne') %}
          {% set auto    = states('switch.pstryk_ups_eaton_ups_automatyczny_harmonogram') %}
          {% set proj    = state_attr('sensor.pstryk_ups_eaton_ups_poziom_naladowania_baterii', 'projected_end_level_pct') %}

          {% if mode == 'charge' %}**🔋 ŁADOWANIE** — Magazynowanie energii przy korzystnej cenie.
          {% elif mode == 'discharge' %}**⚡ ROZŁADOWYWANIE** — Zasilanie domu ze zgromadzonej energii.
          {% elif mode == 'idle' %}**💤 BEZCZYNNOŚĆ** — Brak aktywnego ładowania lub rozładowania.
          {% else %}**❓ NIEZNANY** — Oczekiwanie na pierwsze odświeżenie harmonogramu.
          {% endif %}

          | Metryka | Wartość |
          |---------|---------|
          | Bateria teraz | **{{ batt }}%** {% if batt >= 60 %}🟢{% elif batt >= 30 %}🟡{% else %}🔴{% endif %} |
          | Prognozowany poziom końcowy | {{ proj ~ ' %' if proj is not none else '—' }} |
          | Aktualny pobór mocy | **{{ power }} kW** |
          | Cena energii | **{{ price }} PLN/kWh** |
          | Szacowane oszczędności (dziś) | **{{ savings }} PLN** |
          | Auto-harmonogram AI | **{{ 'Włączony ✅' if auto == 'on' else 'Wyłączony ⛔' }}** |


  # ===========================================================================
  # VIEW 2: SCHEDULE
  # AI-generated 24-hour plan, past 3h history, upcoming charge/discharge windows
  # ===========================================================================
  - title: Harmonogram
    path: ups-harmonogram
    icon: mdi:calendar-clock
    cards:

      # Current mode banner
      - type: markdown
        content: |
          {% set mode    = states('sensor.pstryk_ups_eaton_ups_status_harmonogramu') %}
          {% set auto_en = state_attr('sensor.pstryk_ups_eaton_ups_status_harmonogramu', 'auto_schedule_enabled') %}
          {% if mode == 'charge' %}## 🔋 Aktualnie: ŁADOWANIE
          {% elif mode == 'discharge' %}## ⚡ Aktualnie: ROZŁADOWYWANIE
          {% elif mode == 'idle' %}## 💤 Aktualnie: BEZCZYNNOŚĆ
          {% else %}## ❓ Status: NIEZNANY — odśwież harmonogram
          {% endif %}
          AI Auto-harmonogram: **{{ 'Włączony' if auto_en else 'Wyłączony' }}**

      # 24-hour schedule table
      - type: markdown
        title: "📅 Harmonogram na następne 24h"
        content: |
          {% set slots = state_attr('sensor.pstryk_ups_eaton_ups_harmonogram_nastepne_24h', 'slots') %}
          {% if slots is not none and slots | length > 0 %}
          | Godzina | Akcja | Cena (PLN/kWh) |
          |:-------:|:-----:|:-------------:|
          {% for slot in slots -%}
          {%- set action = slot.action | default('idle') if slot is mapping else 'idle' -%}
          {%- set hour   = slot.hour   | default(loop.index0) if slot is mapping else loop.index0 -%}
          {%- set pval   = slot.price  | default(none)        if slot is mapping else none -%}
          | **{{ '%02d' % hour }}:00** | {% if action == 'charge' %}🔋 Ładowanie{% elif action == 'discharge' %}⚡ Rozładowanie{% else %}💤 Bezczynność{% endif %} | {{ pval | round(4) if pval is not none else '—' }} |
          {% endfor %}
          {% else %}
          *Harmonogram jeszcze niedostępny. Kliknij **Odśwież ceny** na zakładce Przegląd i odczekaj ~30 sek.*
          {% endif %}

      # Past 3-hour table
      - type: markdown
        title: "🕐 Ostatnie 3 godziny"
        content: |
          {% set slots = state_attr('sensor.pstryk_ups_eaton_ups_harmonogram_ostatnie_3h', 'slots') %}
          {% if slots is not none and slots | length > 0 %}
          | Godzina | Akcja | Cena (PLN/kWh) |
          |:-------:|:-----:|:-------------:|
          {% for slot in slots -%}
          {%- set action = slot.action | default('idle') if slot is mapping else 'idle' -%}
          {%- set hour   = slot.hour   | default(loop.index0) if slot is mapping else loop.index0 -%}
          {%- set pval   = slot.price  | default(none)        if slot is mapping else none -%}
          | **{{ '%02d' % hour }}:00** | {% if action == 'charge' %}🔋 Ładowanie{% elif action == 'discharge' %}⚡ Rozładowanie{% else %}💤 Bezczynność{% endif %} | {{ pval | round(4) if pval is not none else '—' }} |
          {% endfor %}
          {% else %}
          *Brak danych historycznych harmonogramu.*
          {% endif %}

      # Upcoming windows + refresh button
      - type: entities
        title: "⏰ Następne okna"
        entities:
          - entity: sensor.pstryk_ups_eaton_ups_nastepne_okno_ladowania
            name: Następne okno ładowania
            icon: mdi:battery-arrow-up-outline
          - entity: sensor.pstryk_ups_eaton_ups_nastepne_okno_rozladowywania
            name: Następne okno rozładowania
            icon: mdi:battery-arrow-down-outline
        footer:
          type: buttons
          entities:
            - entity: button.pstryk_ups_eaton_ups_odswiez_ceny
              name: Odśwież teraz
              icon: mdi:refresh

      # Charge & discharge window lists from attributes
      - type: markdown
        title: "🗓️ Nadchodzące okna ładowania"
        content: |
          {% set wins = state_attr('sensor.pstryk_ups_eaton_ups_nastepne_okno_ladowania', 'charge_windows') %}
          {% if wins is not none and wins | length > 0 %}
          {% for w in wins[:6] %}- {{ w }}
          {% endfor %}
          {% else %}
          *Brak zaplanowanych okien ładowania.*
          {% endif %}

      - type: markdown
        title: "🗓️ Nadchodzące okna rozładowania"
        content: |
          {% set wins = state_attr('sensor.pstryk_ups_eaton_ups_nastepne_okno_rozladowywania', 'discharge_windows') %}
          {% if wins is not none and wins | length > 0 %}
          {% for w in wins[:6] %}- {{ w }}
          {% endfor %}
          {% else %}
          *Brak zaplanowanych okien rozładowania.*
          {% endif %}


  # ===========================================================================
  # VIEW 3: ENERGY & HISTORY
  # Power consumption, battery, price and savings graphs + attribute tables
  # ===========================================================================
  - title: Energia
    path: ups-energia
    icon: mdi:chart-line
    cards:

      # Live snapshot
      - type: glance
        title: Bieżące wartości
        show_name: true
        show_icon: true
        show_state: true
        entities:
          - entity: sensor.pstryk_ups_eaton_ups_biezacy_pobor_mocy
            name: Pobór mocy
            icon: mdi:lightning-bolt
          - entity: sensor.pstryk_ups_eaton_ups_poziom_naladowania_baterii
            name: Bateria
            icon: mdi:battery
          - entity: sensor.pstryk_ups_eaton_ups_cena_energii_elektrycznej
            name: Cena
            icon: mdi:cash
          - entity: sensor.pstryk_ups_eaton_ups_szacowane_oszczednosci_dzienne
            name: Oszczędności
            icon: mdi:piggy-bank-outline

      # Power draw — 24 h
      - type: history-graph
        title: "Pobór mocy — ostatnie 24h"
        hours_to_show: 24
        entities:
          - entity: sensor.pstryk_ups_eaton_ups_biezacy_pobor_mocy
            name: Pobór mocy (kW)

      # Power draw — 7 days
      - type: history-graph
        title: "Pobór mocy — ostatnie 7 dni"
        hours_to_show: 168
        entities:
          - entity: sensor.pstryk_ups_eaton_ups_biezacy_pobor_mocy
            name: Pobór mocy (kW)

      # Battery level — 24 h
      - type: history-graph
        title: "Poziom baterii — ostatnie 24h"
        hours_to_show: 24
        entities:
          - entity: sensor.pstryk_ups_eaton_ups_poziom_naladowania_baterii
            name: Bateria (%)

      # Electricity price — 24 h
      - type: history-graph
        title: "Cena energii — ostatnie 24h"
        hours_to_show: 24
        entities:
          - entity: sensor.pstryk_ups_eaton_ups_cena_energii_elektrycznej
            name: Cena (PLN/kWh)

      # Estimated savings — 7 days
      - type: history-graph
        title: "Szacowane oszczędności — ostatnie 7 dni"
        hours_to_show: 168
        entities:
          - entity: sensor.pstryk_ups_eaton_ups_szacowane_oszczednosci_dzienne
            name: Oszczędności (PLN)

      # Daily consumption from attribute
      - type: markdown
        title: "📊 Historia dobowego zużycia"
        content: |
          {% set daily = state_attr('sensor.pstryk_ups_eaton_ups_biezacy_pobor_mocy', 'history_daily_entries') %}
          {% if daily is not none and daily | length > 0 %}
          | Data | Zużycie |
          |------|---------|
          {% for entry in daily -%}
          {%- if entry is mapping -%}
          | {{ entry.date | default('—') }} | {{ entry.kwh | default(entry.get('value', '?')) | round(2) }} kWh |
          {%- else -%}
          | Dzień {{ loop.index }} | {{ entry | round(2) }} kWh |
          {%- endif %}
          {% endfor %}
          {% else %}
          *Dane dobowe budują się z czasem — sprawdź ponownie po co najmniej 24h działania integracji.*
          {% endif %}

      # Price forecast from attribute
      - type: markdown
        title: "💰 Prognoza cen"
        content: |
          {% set upcoming = state_attr('sensor.pstryk_ups_eaton_ups_cena_energii_elektrycznej', 'upcoming_prices') %}
          {% set count    = state_attr('sensor.pstryk_ups_eaton_ups_cena_energii_elektrycznej', 'price_count') %}
          {% set refresh  = state_attr('sensor.pstryk_ups_eaton_ups_cena_energii_elektrycznej', 'last_refresh') %}

          **{{ count | default(0) }} cen załadowanych** — Ostatnie odświeżenie: {{ refresh | default('nigdy') }}

          {% if upcoming is not none and upcoming | length > 0 %}
          | Godzina | Cena (PLN/kWh) |
          |:-------:|:-------------:|
          {% for p in upcoming[:12] -%}
          {%- if p is mapping -%}
          | {{ p.hour | default(loop.index0) }}:00 | {{ p.price | default(p.get('value', p)) | round(4) }} |
          {%- else -%}
          | Slot {{ loop.index }} | {{ p | round(4) }} |
          {%- endif %}
          {% endfor %}
          {% else %}
          *Kliknij Odśwież ceny na zakładce Przegląd, aby załadować ceny.*
          {% endif %}


  # ===========================================================================
  # VIEW 4: SYSTEM DIAGNOSTICS
  # API health, MQTT status, AI prompt inspection, full entity inventory
  # ===========================================================================
  - title: System
    path: ups-system
    icon: mdi:cog-outline
    cards:

      # API health at a glance
      - type: glance
        title: Status API
        show_name: true
        show_icon: true
        show_state: true
        entities:
          - entity: sensor.pstryk_ups_eaton_ups_status_api_pstryk
            name: Pstryk API
            icon: mdi:cloud-check-outline
          - entity: sensor.pstryk_ups_eaton_ups_status_api_claude
            name: Claude AI
            icon: mdi:brain

      # Detailed API + MQTT diagnostics
      - type: markdown
        title: "🔌 Szczegóły API i MQTT"
        content: |
          {% set pstryk_st  = states('sensor.pstryk_ups_eaton_ups_status_api_pstryk') %}
          {% set claude_st  = states('sensor.pstryk_ups_eaton_ups_status_api_claude') %}
          {% set last_req   = state_attr('sensor.pstryk_ups_eaton_ups_status_api_pstryk', 'last_request') %}
          {% set last_err   = state_attr('sensor.pstryk_ups_eaton_ups_status_api_pstryk', 'last_error') %}
          {% set mqtt_st    = state_attr('sensor.pstryk_ups_eaton_ups_status_api_pstryk', 'mqtt_status') %}
          {% set claude_src = state_attr('sensor.pstryk_ups_eaton_ups_status_api_claude', 'schedule_source') %}

          **Pstryk API:** `{{ pstryk_st }}`
          {% if last_req %}— Ostatnie żądanie: `{{ last_req }}`{% endif %}
          {% if last_err %}— ⚠️ Ostatni błąd: `{{ last_err }}`{% endif %}

          **Claude AI:** `{{ claude_st }}`
          {% if claude_src %}— Źródło harmonogramu: **{{ claude_src }}** *(claude = AI · heuristic = zapasowy)*{% endif %}

          **MQTT:** `{{ mqtt_st | default('nieznany') }}`

      # AI scheduling info
      - type: entities
        title: "🤖 Informacje AI"
        show_header_toggle: false
        entities:
          - entity: sensor.pstryk_ups_eaton_ups_status_api_claude
            name: Status Claude API
            secondary_info: last-changed
          - entity: sensor.pstryk_ups_eaton_ups_status_harmonogramu
            name: Aktualna akcja harmonogramu
            secondary_info: last-changed

      # Full entity inventory — every entity the integration created
      - type: entities
        title: "📋 Wszystkie encje integracji"
        show_header_toggle: false
        entities:
          - type: section
            label: Sensory
          - entity: sensor.pstryk_ups_eaton_ups_cena_energii_elektrycznej
          - entity: sensor.pstryk_ups_eaton_ups_biezacy_pobor_mocy
          - entity: sensor.pstryk_ups_eaton_ups_status_harmonogramu
          - entity: sensor.pstryk_ups_eaton_ups_nastepne_okno_ladowania
          - entity: sensor.pstryk_ups_eaton_ups_nastepne_okno_rozladowywania
          - entity: sensor.pstryk_ups_eaton_ups_poziom_naladowania_baterii
          - entity: sensor.pstryk_ups_eaton_ups_szacowane_oszczednosci_dzienne
          - entity: sensor.pstryk_ups_eaton_ups_status_api_pstryk
          - entity: sensor.pstryk_ups_eaton_ups_status_api_claude
          - entity: sensor.pstryk_ups_eaton_ups_harmonogram_nastepne_24h
          - entity: sensor.pstryk_ups_eaton_ups_harmonogram_ostatnie_3h
          - type: section
            label: Przełączniki
          - entity: switch.pstryk_ups_eaton_ups_automatyczny_harmonogram
          - entity: switch.pstryk_ups_eaton_ups_ladowanie_ups
          - entity: switch.pstryk_ups_eaton_ups_rozladowywanie_ups
          - type: section
            label: Przyciski
          - entity: button.pstryk_ups_eaton_ups_odswiez_ceny
